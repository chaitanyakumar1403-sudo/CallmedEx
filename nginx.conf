worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ─────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Connection pooling
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ─── Gzip Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        application/wasm;

    # ─── Rate Limiting Zones ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_telemed:10m rate=10r/m;

    # ─── Connection Limiting ─────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ─── Upstream: FastAPI Backend ───────────────────────────────────────
    upstream callmedex_api {
        server backend:8000;
        keepalive 32;
    }

    # ─── HTTP Server ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Connection limit per IP
        limit_conn conn_per_ip 50;

        # Health check bypass (for load balancers)
        location /api/health {
            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
        }

        # For development, proxy everything on port 80
        # In production, uncomment the redirect below:
        # return 301 https://$host$request_uri;

        # ─── Default API proxy ───────────────────────────────────────
        location / {
            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Security Headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ─── Auth endpoints: strict rate limiting ────────────────────
        location /api/auth/ {
            limit_req zone=api_auth burst=3 nodelay;
            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Telemedicine endpoints: moderate rate limiting ──────────
        location /api/telemed/ {
            limit_req zone=api_telemed burst=5 nodelay;

            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for AI finalization
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── Upload endpoints: moderate rate limiting ────────────────
        location /api/reports/ {
            limit_req zone=api_upload burst=5 nodelay;
            client_max_body_size 15m;
            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for AI processing
            proxy_read_timeout 300s;
        }

        location /api/verification/ {
            limit_req zone=api_upload burst=3 nodelay;
            client_max_body_size 15m;
            proxy_pass http://callmedex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for AI processing
            proxy_read_timeout 300s;
        }

        # ─── WebSocket support (future real-time tracking) ───────────
        location /ws/ {
            proxy_pass http://callmedex_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;  # 24h for WebSocket connections
            proxy_send_timeout 86400s;
        }

        # ─── Block common attack paths ───────────────────────────────
        location ~ /\.(git|svn|env|htaccess|htpasswd) {
            deny all;
            return 404;
        }

        location ~ /wp-(admin|login|content|includes) {
            deny all;
            return 404;
        }

        location ~ /phpmyadmin {
            deny all;
            return 404;
        }

        # Block common vulnerability scanners
        location ~ /(\.well-known/|actuator|api-docs|swagger) {
            deny all;
            return 404;
        }
    }

